start:
  name: Start Spotify sleep timer
  description: Start a Spotify playlist and stop playback when the timer expires.
  fields:
    media_player:
      name: Media player
      description: Spotify-capable media player entity to control.
      required: true
      selector:
        entity:
          domain: media_player
    playlist_uri:
      name: Playlist URI
      description: Spotify playlist URI, for example spotify:playlist:37i9dQZF1DX4WYpdgoIcn6.
      required: true
      selector:
        text:
    duration:
      name: Duration
      description: Sleep timer duration in seconds.
      required: true
      selector:
        number:
          min: 60
          max: 43200
          unit_of_measurement: seconds
          mode: box
    notify_service:
      name: Notify service
      description: Mobile app notify service, for example notify.mobile_app_your_phone.
      required: true
      selector:
        text:
    timer_id:
      name: Timer ID
      description: Optional stable ID for replacing or cancelling a specific timer.
      required: false
      selector:
        text:
cancel:
  name: Cancel Spotify sleep timer
  description: Cancel an active Spotify sleep timer.
  fields:
    timer_id:
      name: Timer ID
      description: Timer ID to cancel. Defaults to spotify_sleep_timer.
      required: false
      selector:
        text:
