start:
  name: Start Spotify sleep timer
  description: Start a Spotify playlist, or resume the current queue, and stop playback when the timer expires.
  fields:
    media_player:
      name: Media player
      description: Optional Spotify media player override. If omitted, the linked default Spotify media player is used.
      required: false
      selector:
        entity:
          domain: media_player
    playlist_uri:
      name: Playlist URI
      description: Optional Spotify playlist URI. If omitted, the selected recent playlist is used, or the current queue resumes when the selector is set to Current queue.
      required: false
      selector:
        text:
    duration:
      name: Duration
      description: Sleep timer duration in seconds.
      required: true
      selector:
        number:
          min: 60
          max: 43200
          unit_of_measurement: seconds
          mode: box
    notify_service:
      name: Notify service
      description: Optional notify entity or legacy notify service override. If omitted, the notify target selected during setup is used.
      required: false
      selector:
        text:
    timer_id:
      name: Timer ID
      description: Optional stable ID for replacing or cancelling a specific timer.
      required: false
      selector:
        text:
cancel:
  name: Cancel Spotify sleep timer
  description: Cancel an active Spotify sleep timer.
  fields:
    timer_id:
      name: Timer ID
      description: Timer ID to cancel. Defaults to spotify_sleep_timer.
      required: false
      selector:
        text:
