type: vertical-stack
cards:
  - type: entities
    title: Spotify Sleep Timer
    entities:
      - type: conditional
        conditions:
          - entity: sensor.spotify_sleep_timer
            state_not: "0"
        row:
          entity: sensor.spotify_sleep_timer
          name: Time remaining
      - entity: select.spotify_sleep_timer_playlist
        name: Playlist
  - type: horizontal-stack
    cards:
      - type: button
        name: 30 min
        icon: mdi:timer-play
        tap_action:
          action: call-service
          service: spotify_sleep_timer.start
          data:
            duration: 1800
      - type: button
        name: 45 min
        icon: mdi:timer-play
        tap_action:
          action: call-service
          service: spotify_sleep_timer.start
          data:
            duration: 2700
      - type: button
        name: 60 min
        icon: mdi:timer-play
        tap_action:
          action: call-service
          service: spotify_sleep_timer.start
          data:
            duration: 3600
  - type: button
    name: Cancel sleep timer
    icon: mdi:timer-cancel
    tap_action:
      action: call-service
      service: spotify_sleep_timer.cancel
      data:
        timer_id: spotify_sleep_timer
  - type: vertical-stack
    cards:
      - type: entities
        title: Playlist editor
        entities:
          - entity: text.spotify_sleep_timer_playlist_name
            name: New playlist name
          - entity: text.spotify_sleep_timer_playlist_url
            name: New playlist URL
      - type: horizontal-stack
        cards:
          - type: tile
            name: Save
            icon: mdi:playlist-plus
            tap_action:
              action: call-service
              service: spotify_sleep_timer.save_playlist
          - type: tile
            name: Remove
            icon: mdi:playlist-remove
            tap_action:
              action: call-service
              service: spotify_sleep_timer.remove_playlist
